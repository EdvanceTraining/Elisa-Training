<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listening Self-Assessment</title>
  <style>
    :root {
      --primary: #173f5f;
      --secondary: #2f75b5;
      --light: #f4f7fa;
      --border: #d7dee7;
      --text: #1f2933;
      --success: #237a57;
      --warning: #a56200;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--light);
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      width: min(900px, 92%);
      margin: 32px auto;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(23, 63, 95, 0.1);
    }

    h1 {
      margin-top: 0;
      color: var(--primary);
      font-size: clamp(1.8rem, 4vw, 2.5rem);
    }

    .intro {
      margin-bottom: 24px;
    }

    .progress-wrap {
      margin: 20px 0 28px;
    }

    .progress-text {
      font-weight: 700;
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 12px;
      background: #e7edf3;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: var(--secondary);
      transition: width 0.25s ease;
    }

    .question {
      padding: 22px 0;
      border-top: 1px solid var(--border);
    }

    .question:first-of-type {
      border-top: none;
    }

    .question-title {
      display: block;
      font-weight: 700;
      margin-bottom: 12px;
      font-size: 1.05rem;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .answer-label {
      position: relative;
    }

    .answer-label input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .answer-label span {
      display: block;
      text-align: center;
      padding: 12px 8px;
      border: 2px solid var(--border);
      border-radius: 9px;
      cursor: pointer;
      transition: 0.2s ease;
      min-height: 52px;
    }

    .answer-label span:hover {
      border-color: var(--secondary);
      background: #f3f8fc;
    }

    .answer-label input:checked + span {
      border-color: var(--secondary);
      background: var(--secondary);
      color: #fff;
      font-weight: 700;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    button {
      border: none;
      border-radius: 9px;
      padding: 13px 20px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .primary-button {
      background: var(--primary);
      color: #fff;
    }

    .secondary-button {
      background: #e8edf2;
      color: var(--text);
    }

    button:hover {
      filter: brightness(0.96);
    }

    .message {
      margin-top: 18px;
      font-weight: 700;
      color: #b42318;
    }

    .result {
      display: none;
      margin-top: 28px;
      padding: 24px;
      border-radius: 12px;
      background: #eef7f3;
      border-left: 6px solid var(--success);
    }

    .result h2 {
      margin-top: 0;
      color: var(--success);
    }

    .score {
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--primary);
      margin: 8px 0;
    }

    @media (max-width: 650px) {
      .card {
        padding: 20px;
      }

      .answers {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 400px) {
      .answers {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Listening Self-Assessment</h1>
      <p class="intro">
        For each statement, select the answer that best reflects what you usually do.
        Answer all 12 questions to receive your listening score.
      </p>

      <div class="progress-wrap" aria-live="polite">
        <div class="progress-text"><span id="answeredCount">0</span> of 12 answered</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <form id="quizForm">
        <div id="questions"></div>

        <div class="actions">
          <button type="submit" class="primary-button">See my result</button>
          <button type="button" class="secondary-button" id="resetButton">Start again</button>
        </div>

        <div class="message" id="message" role="alert"></div>
      </form>

      <section class="result" id="result" aria-live="polite">
        <h2>Your result</h2>
        <div class="score"><span id="score">0</span> / 120</div>
        
      </section>
    </section>
  </main>

  <script>
    const questions = [
      {
        text: "When listening, I get distracted by my own thoughts.",
        scores: [10, 7, 3, 1]
      },
      {
        text: "When listening, I ignore my phone.",
        scores: [1, 3, 7, 10]
      },
      {
        text: "When listening, I wait until the person has finished before I decide on my reply.",
        scores: [1, 3, 7, 10]
      },
      {
        text: "When listening, I avoid interrupting.",
        scores: [1, 3, 7, 10]
      },
      {
        text: "When listening, I think about my response while a person is talking.",
        scores: [10, 7, 3, 1]
      },
      {
        text: "When listening, I help the other person if they are not being clear.",
        scores: [10, 7, 3, 1]
      },
      {
        text: "When listening, I ask questions if I do not understand.",
        scores: [1, 3, 7, 10]
      },
      {
        text: "When listening, I finish other people’s sentences.",
        scores: [10, 7, 3, 1]
      },
      {
        text: "When listening, I notice the speaker’s body language while they are talking.",
        scores: [1, 3, 7, 10]
      },
      {
        text: "When listening, I remember information from conversations.",
        scores: [1, 3, 7, 10]
      },
      {
        text: "When listening, I make eye contact with the speaker.",
        scores: [1, 3, 7, 10]
      },
      {
        text: "When listening, I decide whether to listen depending on who the speaker is.",
        scores: [10, 7, 3, 1]
      }
    ];

    const answerLabels = ["Never", "Not very often", "Sometimes", "Always"];
    const questionsContainer = document.getElementById("questions");
    const quizForm = document.getElementById("quizForm");
    const resultBox = document.getElementById("result");
    const scoreDisplay = document.getElementById("score");
    const message = document.getElementById("message");
    const resetButton = document.getElementById("resetButton");
    const answeredCount = document.getElementById("answeredCount");
    const progressFill = document.getElementById("progressFill");

    questions.forEach((question, questionIndex) => {
      const questionBlock = document.createElement("div");
      questionBlock.className = "question";

      const title = document.createElement("span");
      title.className = "question-title";
      title.textContent = `${questionIndex + 1}. ${question.text}`;
      questionBlock.appendChild(title);

      const answers = document.createElement("div");
      answers.className = "answers";

      answerLabels.forEach((label, answerIndex) => {
        const answerLabel = document.createElement("label");
        answerLabel.className = "answer-label";

        answerLabel.innerHTML = `
          <input
            type="radio"
            name="question-${questionIndex}"
            value="${question.scores[answerIndex]}"
            aria-label="${label}"
          />
          <span>${label}</span>
        `;

        answers.appendChild(answerLabel);
      });

      questionBlock.appendChild(answers);
      questionsContainer.appendChild(questionBlock);
    });

    function updateProgress() {
      const answered = new Set(
        Array.from(document.querySelectorAll('input[type="radio"]:checked'))
          .map(input => input.name)
      ).size;

      answeredCount.textContent = answered;
      progressFill.style.width = `${(answered / questions.length) * 100}%`;
    }

    quizForm.addEventListener("change", updateProgress);

    quizForm.addEventListener("submit", function(event) {
      event.preventDefault();

      const selectedAnswers = document.querySelectorAll('input[type="radio"]:checked');

      if (selectedAnswers.length !== questions.length) {
        message.textContent = "Please answer every question before viewing your result.";
        resultBox.style.display = "none";
        return;
      }

      message.textContent = "";

      const total = Array.from(selectedAnswers)
        .reduce((sum, answer) => sum + Number(answer.value), 0);

      scoreDisplay.textContent = total;
      resultBox.style.display = "block";
      resultBox.scrollIntoView({ behavior: "smooth", block: "center" });
    });

    resetButton.addEventListener("click", function() {
      quizForm.reset();
      message.textContent = "";
      resultBox.style.display = "none";
      answeredCount.textContent = "0";
      progressFill.style.width = "0%";
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  </script>
</body>
</html>
